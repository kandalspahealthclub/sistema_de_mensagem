<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Mensageiro Pro - SMS Nativo (Mobile)</title>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #25D366;
            --primary-dark: #128C7E;
            --secondary: #34B7F1;
            --danger: #dc3545;
            --warning: #ffc107;
            --success: #28a745;
            --dark: #1e293b;
            --light: #f1f5f9;
            --white: #ffffff;
            --border: #cbd5e1;
        }

        body {
            background: var(--primary);
            padding: 0;
            margin: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* App container - sem altura fixa, scroll natural */
        .app-container {
            max-width: 700px;
            margin: 0 auto;
            background: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* Header */
        .header {
            background: var(--primary);
            color: white;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 { font-size: 1.4rem; font-weight: 600; }
        .header-stats { background: rgba(0,0,0,0.2); padding: 6px 12px; border-radius: 40px; font-size: 0.8rem; }
        .btn-logout { background: rgba(0,0,0,0.2); border: none; color: white; padding: 6px 14px; border-radius: 40px; font-size: 0.8rem; }

        /* Main content - coluna única */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 16px;
        }

        /* Painel de contactos */
        .contacts-panel {
            background: var(--light);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .panel-header {
            padding: 14px 16px;
            background: white;
            border-bottom: 2px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-header h3 { font-size: 1.2rem; }
        .btn-icon-group { display: flex; gap: 12px; }
        .btn-icon {
            background: var(--primary);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            font-size: 1.4rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
        }
        .btn-icon.upload { background: #1e40af; }

        .search-box { padding: 12px; background: white; border-bottom: 1px solid var(--border); }
        .search-box input {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 50px;
            background: var(--light);
        }

        .contacts-list {
            max-height: 45vh;
            overflow-y: auto;
            padding: 8px;
        }
        .contact-item {
            background: white;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 14px;
            border: 1px solid var(--border);
            transition: 0.1s;
        }
        .contact-item.selected {
            background: #e6f9ed;
            border-color: var(--primary);
            border-width: 2px;
        }
        .contact-avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        .contact-info { flex: 1; }
        .contact-name { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
        .contact-phone { font-size: 0.8rem; color: #475569; }
        .contact-obs { font-size: 0.7rem; color: #64748b; margin-top: 4px; }
        .contact-actions { display: flex; gap: 12px; margin-top: 8px; }
        .btn-edit, .btn-delete {
            padding: 6px 16px;
            border-radius: 40px;
            border: none;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-edit { background: var(--secondary); color: white; }
        .btn-delete { background: var(--danger); color: white; }
        .contact-checkbox {
            width: 26px;
            height: 26px;
            accent-color: var(--primary);
            flex-shrink: 0;
        }

        /* Painel de mensagem */
        .message-panel {
            background: var(--light);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .message-header {
            padding: 14px 16px;
            background: white;
            border-bottom: 2px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .selected-count {
            background: var(--primary);
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .message-composer {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .stats-panel {
            background: white;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
        }
        .stats-grid {
            display: flex;
            justify-content: space-around;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }
        .template-selector {
            background: white;
            border-radius: 20px;
            padding: 12px;
        }
        .template-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-template {
            background: #e2e8f0;
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .variables-info {
            background: #dbeafe;
            padding: 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #1e3a8a;
        }
        .message-input textarea {
            width: 100%;
            min-height: 140px;
            padding: 14px;
            font-size: 1rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-family: inherit;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }
        .btn {
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }

        /* Modais */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 24px;
            width: 90%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 20px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            z-index: 1100;
            display: none;
            text-align: center;
            max-width: 85vw;
        }
        .toast.show { display: block; }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .empty-state { text-align: center; padding: 40px; color: #64748b; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>📱 Mensageiro Pro</h1>
        <div class="header-actions">
            <span class="header-stats" id="total-contacts">0 contatos</span>
            <button class="btn-logout" onclick="resetDatabase()">Reset</button>
        </div>
    </div>

    <div class="main-content">
        <!-- Contact List -->
        <div class="contacts-panel">
            <div class="panel-header">
                <h3>📇 Contatos</h3>
                <div class="btn-icon-group">
                    <button class="btn-icon" onclick="showAddContactModal()">+</button>
                    <button class="btn-icon upload" onclick="triggerFileUpload()">📂</button>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="search-contacts" placeholder="🔍 Buscar contato..." oninput="filterContacts()">
            </div>
            <div class="contacts-list" id="contacts-list"></div>
        </div>

        <!-- Message Composer -->
        <div class="message-panel">
            <div class="message-header">
                <h3>✏️ Mensagem</h3>
                <div class="selected-count" id="selected-count">0 selecionados</div>
            </div>
            <div class="message-composer">
                <div class="stats-panel">
                    <div class="stats-grid">
                        <div class="stat-item"><div class="stat-value" id="stat-contatos">0</div><div>Contatos</div></div>
                        <div class="stat-item"><div class="stat-value" id="stat-mensagens">0</div><div>Enviadas</div></div>
                    </div>
                </div>

                <div class="template-selector">
                    <div>📋 Templates:</div>
                    <div class="template-buttons">
                        <button class="btn-template" onclick="insertTemplate('Olá {nome}, tudo bem?')">Saudação</button>
                        <button class="btn-template" onclick="insertTemplate('{nome}, temos uma oferta!')">Promoção</button>
                        <button class="btn-template" onclick="insertTemplate('Lembrete: {nome} amanhã.')">Lembrete</button>
                    </div>
                </div>

                <div class="variables-info">
                    💡 Use <code>{nome}</code>, <code>{telefone}</code>, <code>{observacoes}</code><br>
                    📲 Cada contato abrirá o SMS nativo (você clica em enviar).
                </div>

                <div class="message-input">
                    <textarea id="message-text" placeholder="Digite sua mensagem..."></textarea>
                    <div class="char-counter" id="char-counter">0 caracteres</div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="sendMessagesNative()">📤 Enviar SMS (Nativo)</button>
                    <button class="btn btn-secondary" onclick="clearSelection()">🔄 Limpar Seleção</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modais -->
<div class="modal" id="contact-modal"><div class="modal-content"><div class="modal-header"><h3>➕ Novo Contato</h3><span class="modal-close" onclick="hideAddContactModal()">&times;</span></div>
    <div class="form-group"><label>Nome</label><input type="text" id="contact-name" placeholder="Ex: Ana"></div>
    <div class="form-group"><label>Telefone (com DDD)</label><input type="tel" id="contact-phone" placeholder="11999999999"></div>
    <div class="form-group"><label>Observações</label><textarea id="contact-obs" placeholder="Opcional"></textarea></div>
    <div style="display:flex; gap:12px"><button class="btn btn-primary" onclick="addContact()">Salvar</button><button class="btn btn-secondary" onclick="hideAddContactModal()">Cancelar</button></div>
</div></div>

<div class="modal" id="edit-contact-modal"><div class="modal-content"><div class="modal-header"><h3>✏️ Editar Contato</h3><span class="modal-close" onclick="hideEditContactModal()">&times;</span></div>
    <input type="hidden" id="edit-contact-id">
    <div class="form-group"><label>Nome</label><input type="text" id="edit-contact-name"></div>
    <div class="form-group"><label>Telefone</label><input type="tel" id="edit-contact-phone"></div>
    <div class="form-group"><label>Observações</label><textarea id="edit-contact-obs"></textarea></div>
    <div style="display:flex; gap:12px"><button class="btn btn-primary" onclick="updateContact()">Atualizar</button><button class="btn btn-secondary" onclick="hideEditContactModal()">Cancelar</button></div>
</div></div>

<div class="toast" id="toast"></div>
<input type="file" id="json-uploader" accept=".json" style="display:none" onchange="handleJSONUpload(event)">

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, onValue, push, set, remove, update } from "firebase/database";

    const firebaseConfig = {
        apiKey: "AIzaSyC2i4vZy7ViNyQAM6Fug6uxV42yWICco80",
        authDomain: "mensageiro-pro-c8f1f.firebaseapp.com",
        projectId: "mensageiro-pro-c8f1f",
        storageBucket: "mensageiro-pro-c8f1f.firebasestorage.app",
        messagingSenderId: "512429988910",
        appId: "1:512429988910:web:d2e1015e39beafe32753bf",
        databaseURL: "https://mensageiro-pro-c8f1f-default-rtdb.europe-west1.firebasedatabase.app/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    console.log("Firebase OK (mobile edition)");

    let contacts = [];
    let selectedContacts = new Set();
    let totalMessages = 0;

    const contactsRef = ref(db, 'contatos');
    const statsRef = ref(db, 'estatisticas/total_mensagens');

    onValue(contactsRef, (snapshot) => {
        const data = snapshot.val();
        contacts = [];
        if(data) {
            Object.keys(data).forEach(key => {
                contacts.push({ id: key, ...data[key] });
            });
        }
        contacts.sort((a,b) => (a.nome || '').localeCompare(b.nome || ''));
        renderContacts(document.getElementById('search-contacts')?.value || '');
        updateTotalContactsUI();
        updateStatsUI();
        const existing = new Set(contacts.map(c => c.id));
        for(let id of selectedContacts) if(!existing.has(id)) selectedContacts.delete(id);
        updateSelectedCountUI();
    });

    onValue(statsRef, (snap) => {
        totalMessages = snap.val() || 0;
        document.getElementById('stat-mensagens').innerText = totalMessages;
    });

    // Funções de UI (versão mobile com toque)
    function renderContacts(filter = '') {
        const container = document.getElementById('contacts-list');
        if(!container) return;
        const filtered = contacts.filter(c => 
            (c.nome || '').toLowerCase().includes(filter.toLowerCase()) ||
            (c.telefone || '').includes(filter)
        );
        if(filtered.length === 0) {
            container.innerHTML = '<div class="empty-state"><i>📭</i><p>Nenhum contato</p></div>';
            return;
        }
        container.innerHTML = '';
        filtered.forEach(contact => {
            const isSelected = selectedContacts.has(contact.id);
            const div = document.createElement('div');
            div.className = `contact-item ${isSelected ? 'selected' : ''}`;
            div.innerHTML = `
                <div class="contact-avatar" data-id="${contact.id}">${(contact.nome?.charAt(0) || '?')}</div>
                <div class="contact-info" data-id="${contact.id}">
                    <div class="contact-name">${escapeHtml(contact.nome || '')}</div>
                    <div class="contact-phone">📱 ${formatPhone(contact.telefone || '')}</div>
                    ${contact.observacoes ? `<div class="contact-obs">${escapeHtml(contact.observacoes)}</div>` : ''}
                    <div class="contact-actions">
                        <button class="btn-edit" data-id="${contact.id}">Editar</button>
                        <button class="btn-delete" data-id="${contact.id}">Remover</button>
                    </div>
                </div>
                <input type="checkbox" class="contact-checkbox" data-id="${contact.id}" ${isSelected ? 'checked' : ''}>
            `;
            div.querySelector('.contact-avatar').addEventListener('click', (e) => { e.stopPropagation(); toggleContact(contact.id); });
            div.querySelector('.contact-info').addEventListener('click', (e) => { if(!e.target.classList.contains('btn-edit') && !e.target.classList.contains('btn-delete')) toggleContact(contact.id); });
            div.querySelector('.btn-edit').addEventListener('click', (e) => { e.stopPropagation(); showEditContactModal(contact.id); });
            div.querySelector('.btn-delete').addEventListener('click', (e) => { e.stopPropagation(); deleteContact(contact.id); });
            div.querySelector('.contact-checkbox').addEventListener('change', (e) => { e.stopPropagation(); toggleContact(contact.id); });
            container.appendChild(div);
        });
        updateSelectedCountUI();
    }

    function toggleContact(id) {
        if(selectedContacts.has(id)) selectedContacts.delete(id);
        else selectedContacts.add(id);
        renderContacts(document.getElementById('search-contacts')?.value || '');
    }
    function clearSelection() { selectedContacts.clear(); renderContacts(document.getElementById('search-contacts')?.value || ''); showToast('Seleção limpa'); }
    function updateSelectedCountUI() { document.getElementById('selected-count').innerText = selectedContacts.size === 0 ? '0 selecionados' : `${selectedContacts.size} selecionado${selectedContacts.size !== 1 ? 's' : ''}`; }
    function filterContacts() { renderContacts(document.getElementById('search-contacts').value); }
    function formatPhone(p) { let s = p.replace(/\D/g,''); if(s.length===11) return `(${s.slice(0,2)}) ${s.slice(2,7)}-${s.slice(7)}`; if(s.length===10) return `(${s.slice(0,2)}) ${s.slice(2,6)}-${s.slice(6)}`; return p; }
    function escapeHtml(str) { return str.replace(/[&<>]/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function showToast(msg, type='success') { const t = document.getElementById('toast'); t.innerText = msg; t.className = `toast show ${type}`; setTimeout(()=> t.classList.remove('show'), 3000); }
    function updateTotalContactsUI() { document.getElementById('total-contacts').innerText = `${contacts.length} contato${contacts.length !== 1 ? 's' : ''}`; document.getElementById('stat-contatos').innerText = contacts.length; }
    function updateStatsUI() { document.getElementById('stat-contatos').innerText = contacts.length; }

    // CRUD
    async function addContact() {
        const nome = document.getElementById('contact-name').value.trim();
        let telefone = document.getElementById('contact-phone').value.trim().replace(/\D/g,'');
        const obs = document.getElementById('contact-obs').value.trim();
        if(!nome || !telefone) { showToast('Nome e telefone obrigatórios', 'error'); return; }
        try {
            await set(push(contactsRef), { nome, telefone, observacoes: obs });
            hideAddContactModal();
            showToast('✅ Contato adicionado');
            document.getElementById('contact-name').value = '';
            document.getElementById('contact-phone').value = '';
            document.getElementById('contact-obs').value = '';
        } catch(e) { showToast('Erro: ' + e.message, 'error'); }
    }
    async function updateContact() {
        const id = document.getElementById('edit-contact-id').value;
        const nome = document.getElementById('edit-contact-name').value.trim();
        let telefone = document.getElementById('edit-contact-phone').value.trim().replace(/\D/g,'');
        const obs = document.getElementById('edit-contact-obs').value.trim();
        if(!nome || !telefone) { showToast('Nome e telefone obrigatórios', 'error'); return; }
        try {
            await update(ref(db, `contatos/${id}`), { nome, telefone, observacoes: obs });
            hideEditContactModal();
            showToast('Atualizado');
        } catch(e) { showToast('Erro: ' + e.message, 'error'); }
    }
    async function deleteContact(id) {
        if(!confirm('Remover contato?')) return;
        try {
            await remove(ref(db, `contatos/${id}`));
            selectedContacts.delete(id);
            showToast('Removido');
        } catch(e) { showToast('Erro: ' + e.message, 'error'); }
    }
    async function incrementMessagesSent(amount) { await set(statsRef, totalMessages + amount); }
    async function resetDatabase() {
        if(!confirm('Apagar TODOS os contatos e estatísticas?')) return;
        try {
            await set(contactsRef, null);
            await set(statsRef, 0);
            selectedContacts.clear();
            showToast('Dados reiniciados');
        } catch(e) { showToast('Erro: ' + e.message, 'error'); }
    }
    async function handleJSONUpload(event) {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const json = JSON.parse(e.target.result);
                let list = Array.isArray(json) ? json : (json.contatos ? json.contatos : [json]);
                let imported = 0;
                for(let item of list) {
                    let nome = item.nome || item.name || 'Sem nome';
                    let telefone = (item.contacto || item.telefone || item.phone || '').toString().replace(/\D/g,'');
                    if(!telefone) continue;
                    let obs = item.observacoes || item.obs || '';
                    await set(push(contactsRef), { nome, telefone, observacoes: obs });
                    imported++;
                }
                showToast(`✅ ${imported} contatos importados`);
            } catch(err) { showToast('JSON inválido', 'error'); }
            event.target.value = '';
        };
        reader.readAsText(file);
    }

    function insertTemplate(txt) { document.getElementById('message-text').value = txt; updateCharCount(); }
    function updateCharCount() { const len = document.getElementById('message-text').value.length; document.getElementById('char-counter').innerText = `${len} caracteres`; }
    document.getElementById('message-text').addEventListener('input', updateCharCount);

    function processMessageForContact(template, contact) {
        return template.replace(/{nome}/g, contact.nome || '')
                      .replace(/{telefone}/g, contact.telefone || '')
                      .replace(/{observacoes}/g, contact.observacoes || '');
    }
    async function sendMessagesNative() {
        const msg = document.getElementById('message-text').value;
        if(!msg.trim()) { showToast('Digite uma mensagem', 'error'); return; }
        if(selectedContacts.size === 0) { showToast('Selecione contatos', 'error'); return; }
        const list = Array.from(selectedContacts).map(id => contacts.find(c => c.id === id)).filter(c => c);
        if(!confirm(`Enviar SMS para ${list.length} contato(s)?`)) return;
        let count = 0;
        for(let contact of list) {
            const personalized = processMessageForContact(msg, contact);
            const phone = contact.telefone.replace(/\D/g,'');
            if(phone) {
                window.open(`sms:${phone}?body=${encodeURIComponent(personalized)}`, '_blank');
                await new Promise(r => setTimeout(r, 400));
                count++;
            }
        }
        await incrementMessagesSent(count);
        showToast(`📨 ${count} SMS abertos`);
    }
    function triggerFileUpload() { document.getElementById('json-uploader').click(); }

    // Modais
    function showAddContactModal() { document.getElementById('contact-modal').classList.add('active'); }
    function hideAddContactModal() { document.getElementById('contact-modal').classList.remove('active'); }
    function showEditContactModal(id) {
        const c = contacts.find(c => c.id === id);
        if(c) {
            document.getElementById('edit-contact-id').value = id;
            document.getElementById('edit-contact-name').value = c.nome || '';
            document.getElementById('edit-contact-phone').value = c.telefone || '';
            document.getElementById('edit-contact-obs').value = c.observacoes || '';
            document.getElementById('edit-contact-modal').classList.add('active');
        }
    }
    function hideEditContactModal() { document.getElementById('edit-contact-modal').classList.remove('active'); }

    // Globals
    window.addContact = addContact;
    window.updateContact = updateContact;
    window.deleteContact = deleteContact;
    window.toggleContact = toggleContact;
    window.clearSelection = clearSelection;
    window.filterContacts = filterContacts;
    window.insertTemplate = insertTemplate;
    window.sendMessagesNative = sendMessagesNative;
    window.triggerFileUpload = triggerFileUpload;
    window.handleJSONUpload = handleJSONUpload;
    window.resetDatabase = resetDatabase;
    window.showAddContactModal = showAddContactModal;
    window.hideAddContactModal = hideAddContactModal;
    window.showEditContactModal = showEditContactModal;
    window.hideEditContactModal = hideEditContactModal;
    window.updateCharCount = updateCharCount;
</script>
</body>
